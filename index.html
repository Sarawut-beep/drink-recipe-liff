<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>ค้นหาสูตรเครื่องดื่ม</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f7f7f7;
      color: #222;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      margin-top: 40px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      text-align: center;
    }

    .status {
      margin-top: 30px;
      padding: 14px;
      border-radius: 10px;
      background: #f0f0f0;
    }

    .success {
      background: #e8f5e9;
    }

    .error {
      background: #ffebee;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="card">

      <h1>ระบบค้นหาสูตรเครื่องดื่ม</h1>

      <p>LIFF Version</p>

      <div
        id="status"
        class="status"
      >
        กำลังเชื่อมต่อกับ LINE...
      </div>

    </div>
  </div>


<script>
  const LIFF_ID = '2010750055-ukl2mGbL';

  const API_URL =
    'https://script.google.com/macros/s/AKfycbzqJwPDxPBDX3ARXPowoUOIZfdtm4qgVC6EzO6AMg67qI8HjSWS8QXeKcQ45XYmTcFd/exec';


  async function initializeLiff() {

    const statusElement =
      document.getElementById('status');

    try {

      statusElement.innerHTML =
        'กำลังเชื่อมต่อกับ LINE...';


      await liff.init({
        liffId: LIFF_ID
      });


      if (!liff.isLoggedIn()) {

        liff.login();

        return;

      }


      // ==============================================
      // รับ ID Token จาก LINE
      // ==============================================

      const idToken =
        liff.getIDToken();


      if (!idToken) {

        throw new Error(
          'ไม่สามารถรับข้อมูลยืนยันตัวตนจาก LINE ได้'
        );

      }


      statusElement.innerHTML =
        'กำลังตรวจสอบสิทธิ์ผู้ใช้งาน...';


      // ==============================================
      // ส่ง Token ไปตรวจที่ Apps Script
      // ==============================================

      const response =
        await fetch(
          API_URL,
          {
            method: 'POST',

            headers: {
              'Content-Type':
                'text/plain;charset=utf-8'
            },

            body: JSON.stringify({
              source: 'LIFF',
              action: 'checkUser',
              idToken: idToken
            })
          }
        );


      if (!response.ok) {

        throw new Error(
          'ไม่สามารถเชื่อมต่อระบบตรวจสอบผู้ใช้ได้'
        );

      }


      const result =
        await response.json();


      console.log(result);


      // ==============================================
      // ระบบเกิดข้อผิดพลาด
      // ==============================================

      if (!result.success) {

        throw new Error(
          result.message ||
          'ไม่สามารถตรวจสอบผู้ใช้ได้'
        );

      }


      // ==============================================
      // ยังไม่ลงทะเบียน
      // ==============================================

      if (!result.registered) {

        statusElement.innerHTML =
          'ยังไม่พบการลงทะเบียนของบัญชีนี้<br><br>' +
          'ขั้นตอนถัดไปจะแสดงหน้ากรอกรหัสพนักงาน';

        return;

      }


      // ==============================================
      // บัญชีถูกระงับ
      // ==============================================

      if (result.blocked) {

        statusElement.classList.add(
          'error'
        );

        statusElement.innerHTML =
          'บัญชีของคุณถูกระงับการใช้งาน<br><br>' +
          'กรุณาติดต่อผู้ดูแลระบบ';

        return;

      }


      // ==============================================
      // ผู้ใช้ลงทะเบียนแล้ว
      // ==============================================

      statusElement.classList.add(
        'success'
      );


      statusElement.innerHTML =
        'ตรวจสอบผู้ใช้สำเร็จ<br><br>' +
        'ชื่อ: ' +
        result.name +
        '<br>' +
        'รหัสพนักงาน: ' +
        result.employeeId +
        '<br><br>' +
        'พร้อมเข้าสู่หน้าค้นหาสูตร';


    } catch (error) {

      console.error(error);


      statusElement.classList.add(
        'error'
      );


      statusElement.innerHTML =
        'เกิดข้อผิดพลาด<br><br>' +
        error.message;

    }

  }


  window.addEventListener(
    'load',
    initializeLiff
  );
</script>

</body>
</html>
